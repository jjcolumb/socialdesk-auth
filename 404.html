<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialDesk Auth</title>
  <style>
    body { background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { text-align: center; max-width: 400px; padding: 2rem; }
    h2 { margin-bottom: 0.5rem; }
    p { color: #999; font-size: 0.9rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #444; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="content">
    <div class="spinner"></div>
    <p>Redirecting to SocialDesk...</p>
  </div>
  <script>
    // Grab the full query string from the OAuth provider and bounce to the desktop app.
    const params = window.location.search;
    const path = window.location.pathname; // e.g. /oauth/meta or /oauth/youtube

    // Build the deep link
    const deepLink = 'socialdesk://' + path.replace(/^\//, '') + params;

    // Redirect to the desktop app
    window.location.href = deepLink;

    // Show fallback message after a short delay (in case the deep link doesn't work)
    setTimeout(() => {
      document.getElementById('content').innerHTML = `
        <h2>Authorization complete</h2>
        <p>If SocialDesk didn't open automatically, copy this link and paste it in the app:</p>
        <code style="display:block;background:#222;padding:0.75rem;border-radius:6px;margin-top:1rem;word-break:break-all;font-size:0.8rem;color:#a5b4fc">${deepLink}</code>
        <p style="margin-top:1.5rem">You can close this tab.</p>
      `;
    }, 2000);
  </script>
</body>
</html>
