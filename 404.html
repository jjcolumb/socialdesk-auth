<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialDesk Auth</title>
  <style>
    body { background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { text-align: center; max-width: 400px; padding: 2rem; }
    h2 { margin-bottom: 0.5rem; }
    p { color: #999; font-size: 0.9rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #444; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="content">
    <div class="spinner"></div>
    <p>Redirecting to SocialDesk...</p>
  </div>
  <script>
    const params = window.location.search;
    const path = window.location.pathname.replace(/^\/socialdesk-auth/, '');

    // Try deep link first (works when app is installed/bundled)
    const deepLink = 'socialdesk:/' + path + params;

    // Also try localhost fallback (works in dev mode)
    // The app listens on port 14920 during OAuth flow
    const localhostUrl = 'http://localhost:14920' + path + params;

    // Attempt deep link
    window.location.href = deepLink;

    // After a short delay, try localhost fallback (for dev mode)
    setTimeout(() => {
      window.location.href = localhostUrl;
    }, 1500);

    // Show manual fallback after longer delay
    setTimeout(() => {
      document.getElementById('content').innerHTML = `
        <h2>Authorization complete</h2>
        <p>If SocialDesk didn't open automatically, the app may not be running.</p>
        <p style="margin-top:1rem">You can close this tab.</p>
      `;
    }, 4000);
  </script>
</body>
</html>
